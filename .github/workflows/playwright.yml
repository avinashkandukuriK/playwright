name: Playwright Enterprise Framework

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_env:
        description: Target test environment
        default: qa
        type: choice
        options:
          - qa
          - uat
          - stage
      grep:
        description: Optional Playwright grep, such as @smoke or @api
        required: false
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: ${{ inputs.test_env || 'qa' }}
      BASE_URL: ${{ vars.BASE_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      PORTAL_EXECUTION_ID: ${{ github.run_id }}
      WORKERS: 2
      RETRIES: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run Playwright tests
        run: |
          if [ -n "${{ inputs.grep }}" ]; then
            npx playwright test --config playwright.config.ts --grep "${{ inputs.grep }}"
          else
            npx playwright test --config playwright.config.ts
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 30
